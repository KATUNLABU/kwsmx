# Docker Compose para KSC Website
version: '3.8'

services:
  ksc-website:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ksc-website
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/ksc"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - ksc-network

networks:
  ksc-network:
    driver: bridge
