<svg viewBox="0 0 200 80" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="papercut-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#047857;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#059669;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#065f46;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="paper-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#f0fdf4;stop-opacity:0.7" />
    </radialGradient>
  </defs>
  
  <!-- Background -->
  <rect width="200" height="80" rx="12" fill="url(#papercut-bg)"/>
  
  <!-- Paper stack effect -->
  <rect x="20" y="25" width="35" height="28" rx="3" fill="rgba(255,255,255,0.2)" transform="rotate(-5 37.5 39)"/>
  <rect x="22" y="23" width="35" height="28" rx="3" fill="rgba(255,255,255,0.4)" transform="rotate(-2 39.5 37)"/>
  <rect x="24" y="21" width="35" height="28" rx="3" fill="url(#paper-glow)"/>
  
  <!-- Scissor/cut effect -->
  <path d="M15,35 L35,25 M35,25 L45,35 M35,25 L25,15" stroke="#10b981" stroke-width="2" stroke-linecap="round"/>
  <circle cx="35" cy="25" r="2" fill="#10b981"/>
  
  <!-- Main logo area -->
  <rect x="70" y="15" width="115" height="50" rx="6" fill="rgba(255,255,255,0.95)"/>
  
  <!-- PaperCut text -->
  <text x="80" y="32" font-family="Arial Black, sans-serif" font-size="14" font-weight="900" fill="#047857">PaperCut</text>
  <text x="80" y="48" font-family="Arial, sans-serif" font-size="8" font-weight="600" fill="#059669">PRINT MANAGEMENT</text>
  <text x="80" y="58" font-family="Arial, sans-serif" font-size="8" font-weight="400" fill="#065f46">Smart • Secure • Sustainable</text>
  
  <!-- Printer icon -->
  <rect x="150" y="25" width="25" height="18" rx="2" fill="#10b981" opacity="0.8"/>
  <rect x="152" y="27" width="21" height="14" rx="1" fill="rgba(255,255,255,0.9)"/>
  <rect x="154" y="45" width="17" height="4" rx="1" fill="#059669"/>
  
  <!-- Print dots pattern -->
  <circle cx="160" cy="32" r="1" fill="#047857"/>
  <circle cx="165" cy="32" r="1" fill="#047857"/>
  <circle cx="170" cy="32" r="1" fill="#047857"/>
  <circle cx="160" cy="36" r="1" fill="#047857"/>
  <circle cx="165" cy="36" r="1" fill="#047857"/>
  <circle cx="170" cy="36" r="1" fill="#047857"/>
</svg>
