<svg viewBox="0 0 200 80" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="megaged-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6d28d9;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="doc-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f3f4f6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="200" height="80" rx="12" fill="url(#megaged-bg)"/>
  
  <!-- Digital transformation pattern -->
  <path d="M0,20 Q50,10 100,20 T200,20" stroke="rgba(255,255,255,0.2)" stroke-width="2" fill="none"/>
  <path d="M0,60 Q50,70 100,60 T200,60" stroke="rgba(255,255,255,0.2)" stroke-width="2" fill="none"/>
  
  <!-- Document stack with modern design -->
  <rect x="15" y="20" width="28" height="35" rx="3" fill="rgba(255,255,255,0.1)" transform="rotate(-3 29 37.5)"/>
  <rect x="17" y="18" width="28" height="35" rx="3" fill="rgba(255,255,255,0.2)" transform="rotate(-1 31 35.5)"/>
  <rect x="19" y="16" width="28" height="35" rx="3" fill="url(#doc-gradient)"/>
  
  <!-- Document lines -->
  <line x1="23" y1="22" x2="43" y2="22" stroke="#7c3aed" stroke-width="1"/>
  <line x1="23" y1="26" x2="41" y2="26" stroke="#8b5cf6" stroke-width="1"/>
  <line x1="23" y1="30" x2="43" y2="30" stroke="#7c3aed" stroke-width="1"/>
  <line x1="23" y1="34" x2="39" y2="34" stroke="#8b5cf6" stroke-width="1"/>
  
  <!-- Main logo area -->
  <rect x="55" y="12" width="130" height="56" rx="8" fill="rgba(255,255,255,0.95)"/>
  
  <!-- MegaGED text with modern styling -->
  <text x="65" y="30" font-family="Arial Black, sans-serif" font-size="16" font-weight="900" fill="#7c3aed">Mega</text>
  <text x="110" y="30" font-family="Arial Black, sans-serif" font-size="16" font-weight="900" fill="#8b5cf6">GED</text>
  
  <!-- Subtitle -->
  <text x="65" y="42" font-family="Arial, sans-serif" font-size="7" font-weight="600" fill="#6d28d9">DOCUMENT MANAGEMENT SYSTEM</text>
  <text x="65" y="52" font-family="Arial, sans-serif" font-size="7" font-weight="400" fill="#8b5cf6">Digital • Intelligent • Secure</text>
  <text x="65" y="60" font-family="Arial, sans-serif" font-size="6" font-weight="300" fill="#a855f7">Gestión Electrónica de Documentos</text>
  
  <!-- Cloud storage icon -->
  <ellipse cx="160" cy="28" rx="12" ry="6" fill="#a855f7" opacity="0.6"/>
  <ellipse cx="158" cy="26" rx="8" ry="4" fill="#c084fc" opacity="0.8"/>
  <ellipse cx="162" cy="26" rx="8" ry="4" fill="#ddd6fe" opacity="0.9"/>
  
  <!-- Digital arrows -->
  <path d="M155,38 L165,38 M162,35 L165,38 L162,41" stroke="#7c3aed" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Binary data pattern -->
  <text x="155" y="48" font-family="monospace" font-size="6" fill="#8b5cf6" opacity="0.6">101010</text>
  <text x="155" y="55" font-family="monospace" font-size="6" fill="#a855f7" opacity="0.6">110011</text>
</svg>
