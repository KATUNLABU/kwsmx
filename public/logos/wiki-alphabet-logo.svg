<svg viewBox="0 0 200 80" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="wiki-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ea580c;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f97316;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#dc2626;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="knowledge-glow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#fed7aa;stop-opacity:0.8" />
    </radialGradient>
  </defs>
  
  <!-- Background -->
  <rect width="200" height="80" rx="12" fill="url(#wiki-bg)"/>
  
  <!-- Knowledge network pattern -->
  <circle cx="25" cy="25" r="3" fill="rgba(255,255,255,0.3)"/>
  <circle cx="40" cy="35" r="2" fill="rgba(255,255,255,0.4)"/>
  <circle cx="30" cy="50" r="2" fill="rgba(255,255,255,0.4)"/>
  <circle cx="45" cy="60" r="3" fill="rgba(255,255,255,0.3)"/>
  
  <!-- Connection lines -->
  <line x1="25" y1="25" x2="40" y2="35" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <line x1="40" y1="35" x2="30" y2="50" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <line x1="30" y1="50" x2="45" y2="60" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <line x1="25" y1="25" x2="30" y2="50" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  
  <!-- Open book icon -->
  <path d="M15,35 L35,35 L35,55 Q25,50 15,55 Z" fill="rgba(255,255,255,0.3)"/>
  <path d="M35,35 L55,35 L55,55 Q45,50 35,55 Z" fill="rgba(255,255,255,0.4)"/>
  <line x1="35" y1="35" x2="35" y2="55" stroke="rgba(255,255,255,0.6)" stroke-width="1"/>
  
  <!-- Book pages lines -->
  <line x1="20" y1="40" x2="30" y2="40" stroke="rgba(255,255,255,0.5)" stroke-width="0.5"/>
  <line x1="20" y1="44" x2="28" y2="44" stroke="rgba(255,255,255,0.5)" stroke-width="0.5"/>
  <line x1="40" y1="40" x2="50" y2="40" stroke="rgba(255,255,255,0.5)" stroke-width="0.5"/>
  <line x1="42" y1="44" x2="50" y2="44" stroke="rgba(255,255,255,0.5)" stroke-width="0.5"/>
  
  <!-- Main logo area -->
  <rect x="70" y="8" width="120" height="64" rx="8" fill="url(#knowledge-glow)"/>
  
  <!-- Wiki Alphabet text with creative layout -->
  <text x="80" y="25" font-family="Arial Black, sans-serif" font-size="14" font-weight="900" fill="#ea580c">Wiki</text>
  <text x="80" y="40" font-family="Arial Black, sans-serif" font-size="14" font-weight="900" fill="#f97316">Alphabet</text>
  
  <!-- Subtitle -->
  <text x="80" y="52" font-family="Arial, sans-serif" font-size="7" font-weight="600" fill="#dc2626">KNOWLEDGE BASE PLATFORM</text>
  <text x="80" y="62" font-family="Arial, sans-serif" font-size="6" font-weight="400" fill="#ea580c">Collaborative • Intelligent • Searchable</text>
  
  <!-- Alphabet visualization -->
  <circle cx="155" cy="20" r="8" fill="rgba(234,88,12,0.2)"/>
  <text x="155" y="25" font-family="Arial Black, sans-serif" font-size="10" font-weight="900" text-anchor="middle" fill="#dc2626">A</text>
  
  <circle cx="170" cy="28" r="6" fill="rgba(249,115,22,0.3)"/>
  <text x="170" y="32" font-family="Arial Black, sans-serif" font-size="8" font-weight="900" text-anchor="middle" fill="#ea580c">B</text>
  
  <circle cx="165" cy="42" r="7" fill="rgba(220,38,38,0.2)"/>
  <text x="165" y="47" font-family="Arial Black, sans-serif" font-size="9" font-weight="900" text-anchor="middle" fill="#f97316">C</text>
  
  <circle cx="180" cy="50" r="5" fill="rgba(234,88,12,0.4)"/>
  <text x="180" y="54" font-family="Arial Black, sans-serif" font-size="7" font-weight="900" text-anchor="middle" fill="#dc2626">D</text>
  
  <!-- Search/magnifying glass -->
  <circle cx="150" cy="60" r="6" stroke="#f97316" stroke-width="2" fill="none"/>
  <line x1="155" y1="65" x2="160" y2="70" stroke="#f97316" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Knowledge dots -->
  <circle cx="125" cy="15" r="1" fill="#ea580c"/>
  <circle cx="130" cy="18" r="1" fill="#f97316"/>
  <circle cx="135" cy="15" r="1" fill="#dc2626"/>
  <circle cx="140" cy="18" r="1" fill="#ea580c"/>
</svg>
